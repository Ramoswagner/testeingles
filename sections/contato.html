<section id="contato">
<div class="container">
<h2 class="section-title reveal">Contato e Feedback</h2>
<p class="section-subtitle reveal">Envie sugestões ou dúvidas para melhorar seu aprendizado.</p>
<div class="card reveal">
<form>
<div class="form-group">
<label>Nome</label>
<input type="text" placeholder="Seu nome">
</div>
<div class="form-group">
<label>Email</label>
<input type="email" placeholder="Seu email">
</div>
<div class="form-group">
<label>Mensagem</label>
<textarea rows="4" placeholder="Digite sua mensagem"></textarea>
</div>
<button class="btn">Enviar mensagem</button>
</form>
</div>
</div>
</section>
